services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: eu_funding_signal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      APP_MODE: live
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/eu_funding_signal
      DEMO_DATASET_PATH: frontend/lib/demo-dataset.json
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_APP_MODE: backend
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
